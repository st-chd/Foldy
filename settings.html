<div id="foldy_settings" class="foldy-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Foldy</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox flex-container">
                <input id="foldy_enable_prompts" type="checkbox">
                <span>프롬프트 폴더 사용</span>
            </label>
            <label class="checkbox flex-container">
                <input id="foldy_enable_lorebooks" type="checkbox">
                <span>로어북 폴더 사용</span>
            </label>
            <label class="checkbox flex-container">
                <input id="foldy_enable_regex" type="checkbox">
                <span>정규식 폴더 사용</span>
            </label>
            <div class="foldy-settings-debug">
                <hr>
                <div class="foldy-settings-subtitle">진단</div>
                <div class="foldy-settings-hint">문제가 생겼을 때 현재 Foldy 상태와 디버그 로그를 확인합니다.</div>
                <div class="foldy-settings-actions">
                    <button id="foldy_run_diagnostics" class="menu_button" type="button">진단 실행</button>
                    <button id="foldy_find_unused_data" class="menu_button" type="button">미사용 데이터</button>
                    <button id="foldy_copy_debug_log" class="menu_button" type="button">로그 복사</button>
                    <button id="foldy_show_debug_log" class="menu_button" type="button">로그 보기</button>
                </div>
            </div>
            <div class="foldy-settings-clear">
                <hr>
                <div class="foldy-settings-subtitle">초기화</div>
                <div class="foldy-settings-hint">만들어진 폴더 데이터를 전부 삭제합니다. 되돌릴 수 없습니다.</div>
                <div class="foldy-settings-actions">
                    <button id="foldy_clear_prompts" class="menu_button" type="button">프롬프트</button>
                    <button id="foldy_clear_lorebooks" class="menu_button" type="button">로어북</button>
                    <button id="foldy_clear_regex" class="menu_button" type="button">정규식</button>
                    <button id="foldy_clear_all" class="menu_button caution" type="button">전체</button>
                </div>
            </div>
        </div>
    </div>
</div>
